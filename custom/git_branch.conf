# vim:set ft=tmux:
%hidden MODULE_NAME="git_branch"

set -ogq "@catppuccin_${MODULE_NAME}_icon" " "
set -ogqF "@catppuccin_${MODULE_NAME}_color" "#{E:@thm_teal}"
set -ogq "@catppuccin_${MODULE_NAME}_text" " #(cd #{pane_current_path} && git rev-parse --abbrev-ref HEAD 2>/dev/null | tr -d '\n' && s=$(git status --porcelain 2>/dev/null) && m=$(echo \"$s\" | grep -c '^ [MDRC?]') && a=$(echo \"$s\" | grep -c '^[MADRC]') && { [ \"$a\" -gt 0 ] && printf ' +%%s' \"$a\"; [ \"$m\" -gt 0 ] && printf ' ✎%%s' \"$m\"; } || echo '-')"

source "~/.tmux/plugins/tmux/utils/status_module.conf"
