# ─── General ─────────────────────────────────────────────────────────

# Timezone
set-environment -g TZ "America/Los_Angeles"

# Prefix: C-q (C-b conflicts with Vim)
set -g prefix C-q
bind C-q last-window
bind q send-prefix

# Indexing
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Timing
set -s escape-time 0
set -g repeat-time 600
set -g display-time 1500

# Behavior
set -g history-limit 50000
set -g focus-events on
setw -g aggressive-resize on
setw -g monitor-activity on
set -g visual-activity on
setw -g automatic-rename on

# Mouse
set -g mouse on

# ─── Display ─────────────────────────────────────────────────────────

set -g default-terminal "tmux-256color"
set -ag terminal-features ",*256col*:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# ─── Status Bar ──────────────────────────────────────────────────────

set -g status-position top
set -g status-interval 1
set -g status-justify left

# Catppuccin theme
set -g @catppuccin_window_status_style "rounded"

set -g status-left "#{E:@catppuccin_status_directory} "
set -g status-left-length 80
set -g status-right "#{E:@catppuccin_status_git_branch} #{E:@catppuccin_status_application} #{E:@catppuccin_status_session} #{E:@catppuccin_status_date_time}"
set -g status-right-length 150
set -g @catppuccin_date_time_text " #(TZ='America/Los_Angeles' date +'%%Y-%%m-%%d %%H:%%M')"

# ─── Colors (non-theme) ─────────────────────────────────────────────

set -g display-panes-active-colour colour33  #blue
set -g display-panes-colour colour166        #orange
setw -g clock-mode-colour green

# ─── Key Bindings ────────────────────────────────────────────────────

# Splits (preserve current path)
bind v split-window -h -c "#{pane_current_path}"
bind b split-window -v -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Windows (preserve current path)
bind c new-window -c "#{pane_current_path}"
bind C command-prompt -p "Name of new window: " "new-window -n '%%' -c '#{pane_current_path}'"

# Pane navigation (hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Layouts
bind m run-shell "~/.tmux/scripts/resize-adaptable.sh -l main-horizontal -p 66"
bind M run-shell "~/.tmux/scripts/resize-adaptable.sh -l main-vertical -p 50"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# ─── Copy Mode ───────────────────────────────────────────────────────

setw -g mode-keys vi

# Vi-style copy bindings
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# OSC 52 clipboard (works over SSH and in most modern terminals)
set -s set-clipboard on

# ─── Plugins (TPM) ───────────────────────────────────────────────────

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.1.0'

# Initialize TPM (keep near the bottom)
run '~/.tmux/plugins/tpm/tpm'

# ─── Post-Plugin Overrides ──────────────────────────────────────────

# Transparent status bar background (must be after TPM/catppuccin loads)
set -g status-style bg=default

# Load custom git branch module (must be after catppuccin)
source "~/.tmux/plugins/tmux/status/git_branch.conf"
